<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo List</title>
</head>
<body>
  <dialog class="project-dialog">
    <form class="project-form" autocomplete="off">
      <h1 class="project-form__header">New Project</h1>
      <label for="new_project_title">Title:</label>
      <input type="text" id="new_project_title" name="new_project_title"
        required>
      <button class="project-dialog__submit-button" type="submit">Create
        Project</button>
    </form>
    <button class="project-dialog__close-button">X</button>
  </dialog>
  <dialog class="task-dialog">
    <form class="task-form" autocomplete="off">
      <h1 class="task-form__header">New Task</h1>
      <label class="task-form__label" for="new_task_title">Title:</label>
      <input type="text" id="new_task_title" name="new_task_title" required>
      <label class="task-form__label"
        for="new_task_description">Description:</label>
      <input type="text" id="new_task_description" name="new_task_description">
      <label class="task-form__label" for="new_task_date">Date:</label>
      <input type="date" id="new_task_date" name="new_task_date">
      <legend class="task-form__label">Priority:</legend>
      <div class="task-form__radio-buttons">
        <input type="radio" id="new_task_priority_1" name="new_task_priority"
          value="1" checked>
        <label for="new_task_priority_1">Low</label>
        <input type="radio" id="new_task_priority_2" name="new_task_priority"
          value="2">
        <label for="new_task_priority_2">Medium</label>
        <input type="radio" id="new_task_priority_3" name="new_task_priority"
          value="3">
        <label for="new_task_priority_3">High</label>
      </div>
      <button class="task-dialog__submit-button" type="submit">Create
        task</button>
    </form>
    <button class="task-dialog__close-button">X</button>
  </dialog>
  <div class="content">
    <button class="project-add-button">New Project</button>
    <ul class="project-list"></ul>
  </div>
</body>
</html>
